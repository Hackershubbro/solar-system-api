name: ci

on:
  workflow_dispatch:
  push:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-Buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{secrets.DOCKERHUB_USERNAME }}/solor-system-api:latest

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: shh into ec2 instance
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo apt install -y docker.io
            sudo systemctl enable docker
            sudo systemctl restart docker
            sudo docker stop solor-system-api || true
            sudo docker rm solor-system-api || true
            sudo pull ${{ secrets.DOCKERHUB_USERNAME }}/solor-system-api:latest
            echo "MONGO_URL=${{ secrets.MONGO_URL }}" >> .env
            sudo docker run -d --env-file .env -p 80:8000 --name solor-system-api ${{ secrets.DOCKERHUB_USERNAME }}/solor-system-api:latest